<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>家庭菜单</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, "PingFang SC","Microsoft YaHei", sans-serif; }
    body{ margin:0; background:#f6f7f9; }
    header{ position:sticky; top:0; z-index:5; background:#fff; border-bottom:1px solid #e7e7e7; padding:12px 14px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    header h1{ margin:0; font-size:16px; flex:1; }
    .btn{ border:0; border-radius:12px; padding:10px 12px; cursor:pointer; background:#111; color:#fff; }
    .btn.secondary{ background:#f1f2f4; color:#111; border:1px solid #e7e7e7; }
    .wrap{ display:grid; grid-template-columns: 320px 1fr 360px; gap:12px; padding:12px; }
    @media (max-width: 980px){ .wrap{ grid-template-columns: 1fr; } }
    .panel{ background:#fff; border:1px solid #e7e7e7; border-radius:14px; overflow:hidden; }
    .panel h2{ margin:0; font-size:14px; padding:12px 14px; border-bottom:1px solid #eee; background:#fafafa; }
    .p{ padding:12px; }
    label{ display:block; font-size:12px; color:#666; margin-bottom:6px; }
    input, textarea{ width:100%; box-sizing:border-box; padding:10px; border-radius:12px; border:1px solid #e7e7e7; }
    .grid2{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .muted{ color:#666; font-size:12px; }
    .cats{ padding:10px; display:flex; flex-wrap:wrap; gap:8px; }
    .chip{ border:1px solid #e7e7e7; background:#fff; border-radius:999px; padding:8px 10px; cursor:pointer; font-size:12px; }
    .chip.active{ border-color:#111; }
    .menu{ padding:10px; display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:10px; }
    @media (max-width: 980px){ .menu{ grid-template-columns: repeat(2, minmax(0,1fr)); } }
    @media (max-width: 520px){ .menu{ grid-template-columns: 1fr; } }
    .card{ border:1px solid #eee; border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
    .img{ width:100%; aspect-ratio: 4 / 3; background:#f1f2f4; display:flex; align-items:center; justify-content:center; color:#888; font-size:12px; }
    .img img{ width:100%; height:100%; object-fit:cover; display:block; }
    .card .c{ padding:10px; display:flex; flex-direction:column; gap:6px; }
    .name{ font-weight:800; }
    .meta{ display:flex; justify-content:space-between; gap:8px; font-size:12px; color:#666; }
    .row{ display:flex; align-items:center; gap:8px; border:1px solid #eee; border-radius:14px; padding:10px; }
    .row .meta2{ flex:1; }
    .row .meta2 .n{ font-weight:800; }
    .qty{ display:flex; align-items:center; gap:6px; }
    .qty button{ width:32px; height:32px; border-radius:10px; border:1px solid #e7e7e7; background:#fff; cursor:pointer; }
    .sum{ border-top:1px solid #eee; padding-top:10px; display:flex; flex-direction:column; gap:8px; }
    .actions{ display:flex; gap:8px; }
    .pill{ font-size:12px; padding:4px 8px; border-radius:999px; background:#f1f2f4; }
    .danger{ color:#b42318; }
    .hide{ display:none !important; }
  </style>
</head>
<body>
<header>
  <h1>🍳 家庭菜单</h1>
  <span class="pill" id="dishCount">菜品：0</span>

  <button class="btn secondary" id="loginBtn">管理员登录</button>
  <button class="btn secondary hide" id="logoutBtn">退出登录</button>
  <span class="pill" id="who">访客模式</span>
</header>

<div class="wrap">
  <!-- 左：管理（仅管理员可用） -->
  <section class="panel">
    <h2>添加/管理菜品（仅管理员）</h2>
    <div class="p">
      <div class="grid2">
        <div>
          <label>菜名</label>
          <input id="name" placeholder="例如：红烧排骨" />
        </div>
        <div>
          <label>分类</label>
          <input id="cat" placeholder="例如：家常菜 / 汤 / 甜品" />
        </div>
      </div>

      <div class="grid2" style="margin-top:10px;">
        <div>
          <label>价格（可选）</label>
          <input id="price" placeholder="例如：25（不填也行）" inputmode="decimal" />
        </div>
        <div>
          <label>图片（建议小一点）</label>
          <input id="img" type="file" accept="image/*" />
        </div>
      </div>

      <div style="margin-top:10px;">
        <label>备注（可选）</label>
        <input id="desc" placeholder="例如：少油 / 微辣" />
      </div>

      <div class="actions" style="margin-top:12px;">
        <button class="btn" id="addBtn" style="flex:1;">保存菜品</button>
        <button class="btn secondary" id="resetBtn" style="flex:1;">清空输入</button>
      </div>

      <div class="sum" style="margin-top:12px;">
        <div class="actions">
          <button class="btn secondary" id="seedBtn" style="flex:1;">添加示例菜</button>
          <button class="btn secondary danger" id="wipeBtn" style="flex:1;">清空全部菜品</button>
        </div>
        <div class="muted" id="tip"></div>
      </div>

      <div class="muted" style="margin-top:10px;">
        菜单存云端：你改一次，全家所有设备刷新后都是最新。<br/>
        右侧“今日清单”仍然是每个人自己的（只存在本机）。
      </div>
    </div>
  </section>

  <!-- 中：菜单（所有人可看） -->
  <section class="panel">
    <h2>菜单</h2>
    <div class="cats" id="cats"></div>
    <div class="p" style="padding-top:0;">
      <input id="search" placeholder="搜索菜名..." />
    </div>
    <div class="menu" id="menu"></div>
  </section>

  <!-- 右：今日清单（每设备本地） -->
  <aside class="panel">
    <h2>今日要做/要吃</h2>
    <div class="p">
      <div id="todayList" class="muted">还没选菜</div>

      <div style="margin-top:10px;">
        <label>整单备注（可选）</label>
        <textarea id="note" rows="2" placeholder="例如：今天清淡一点"></textarea>
      </div>

      <div class="sum">
        <div style="display:flex; justify-content:space-between;">
          <div>预计总价</div>
          <div style="font-weight:900;" id="total">¥0</div>
        </div>
        <div class="actions">
          <button class="btn secondary" id="clearTodayBtn" style="flex:1;">清空今日清单</button>
          <button class="btn" id="copyBtn" style="flex:1;">复制清单</button>
        </div>
        <div class="muted" id="todayTip"></div>
      </div>
    </div>
  </aside>
</div>

<script type="module">
  // ===== Firebase 引入 =====
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

  // ===== 你的 firebaseConfig =====
  const firebaseConfig = {
    apiKey: "AIzaSyBomQvnrGffGpq4xd4rhF7amyiBME0eeMA",
    authDomain: "willa-menu-65de8.firebaseapp.com",
    projectId: "willa-menu-65de8",
    storageBucket: "willa-menu-65de8.firebasestorage.app",
    messagingSenderId: "521050906505",
    appId: "1:521050906505:web:ef2706e06aa50c95284b58"
  };

  // ===== 你的管理员邮箱 =====
  const ADMIN_EMAIL = "yanwu6618@gmail.com";

  // ===== 初始化（只一次）=====
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  const menuRef = doc(db, "menus", "default");

  const $ = (id) => document.getElementById(id);
  const on = (id, evt, fn) => { const el = $(id); if(el) el.addEventListener(evt, fn); };

  // 今日清单：每人本机
  const LS_TODAY = "family_today_v2";

  function save(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
  function load(key, fallback){
    try { return JSON.parse(localStorage.getItem(key) || "null") ?? fallback; }
    catch { return fallback; }
  }
  function uid(){ return Math.random().toString(16).slice(2) + Date.now().toString(16); }
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, s => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[s]));
  }
  function money(n){
    if (!Number.isFinite(n)) return "¥0";
    return "¥" + (Math.round(n * 100) / 100).toFixed(2).replace(/\.00$/,"");
  }

  // 默认示例菜（云端没初始化时显示）
  const defaultDishes = [
    { id: uid(), name:"番茄炒蛋", cat:"家常菜", price:12, desc:"少油", imgData:null },
    { id: uid(), name:"玉米排骨汤", cat:"汤", price:28, desc:"清淡", imgData:null },
    { id: uid(), name:"清炒西兰花", cat:"蔬菜", price:10, desc:"蒜蓉", imgData:null },
    { id: uid(), name:"可乐鸡翅", cat:"荤菜", price:26, desc:"微甜", imgData:null },
  ];

  const state = {
    dishes: [],
    today: new Map(Object.entries(load(LS_TODAY, {}))),
    cat: "全部",
    search: ""
  };

  let isAdmin = false;

  function sanitizeDish(d){
    const price = (typeof d.price === "number" && Number.isFinite(d.price)) ? d.price : null; // ✅ 不允许 NaN
    return {
      id: String(d.id || uid()),
      name: String(d.name || "未命名"),
      cat: String(d.cat || "未分类"),
      desc: String(d.desc || ""),
      price,
      imgData: d.imgData || null
    };
  }

  function categories(){
    const cats = [...new Set(state.dishes.map(d => d.cat || "未分类"))];
    cats.sort((a,b)=> a.localeCompare(b, "zh"));
    return ["全部", ...cats];
  }

  function setAdminUI(onAdmin){
    isAdmin = onAdmin;

    // 管理区禁用/启用
    ["addBtn","seedBtn","wipeBtn","name","cat","price","desc","img"].forEach(id=>{
      const el = $(id);
      if(el) el.disabled = !onAdmin;
    });

    if($("tip")){
      $("tip").textContent = onAdmin
        ? "管理员模式：可以修改菜单（全家同步）。"
        : "访客模式：只能查看菜单。";
    }

    $("loginBtn")?.classList.toggle("hide", onAdmin);
    $("logoutBtn")?.classList.toggle("hide", !onAdmin);
    if($("who")) $("who").textContent = onAdmin ? ("管理员：" + ADMIN_EMAIL) : "访客模式";

    renderMenu();
  }

  async function persistCloud(){
    if(!isAdmin){
      if($("tip")) $("tip").textContent = "你不是管理员，无法保存。";
      return false;
    }
    try{
      // ✅ 写入前再清洗一次，确保没有 NaN/undefined
      const clean = state.dishes.map(sanitizeDish);
      await setDoc(menuRef, { dishes: clean, updatedAt: serverTimestamp() }, { merge: true });
      if($("dishCount")) $("dishCount").textContent = "菜品：" + clean.length;
      return true;
    } catch(e){
      console.error(e);
      if($("tip")) $("tip").textContent = "保存失败：请看 Console 报错（常见原因：图片太大或权限问题）。";
      return false;
    }
  }

  function renderCats(){
    const wrap = $("cats");
    if(!wrap) return;
    wrap.innerHTML = "";
    categories().forEach(c => {
      const b = document.createElement("button");
      b.className = "chip" + (c === state.cat ? " active" : "");
      b.textContent = c;
      b.onclick = () => { state.cat = c; renderCats(); renderMenu(); };
      wrap.appendChild(b);
    });
  }

  function renderMenu(){
    const wrap = $("menu");
    if(!wrap) return;
    wrap.innerHTML = "";

    const list = state.dishes
      .map(d => ({...d, cat: d.cat || "未分类"}))
      .filter(d => state.cat === "全部" ? true : d.cat === state.cat)
      .filter(d => (d.name || "").toLowerCase().includes(state.search.toLowerCase().trim()));

    if(list.length === 0){
      wrap.innerHTML = `<div class="muted" style="padding:10px;">暂无菜品。管理员登录后可添加。</div>`;
      return;
    }

    list.forEach(d => {
      const card = document.createElement("div");
      card.className = "card";
      const hasImg = !!d.imgData;

      card.innerHTML = `
        <div class="img">${hasImg ? `<img alt="" src="${d.imgData}">` : "暂无图片"}</div>
        <div class="c">
          <div class="name">${escapeHtml(d.name)}</div>
          <div class="meta">
            <span>${escapeHtml(d.cat)}</span>
            <span>${(typeof d.price === "number" && Number.isFinite(d.price)) ? money(d.price) : ""}</span>
          </div>
          <div class="muted">${escapeHtml(d.desc || "")}</div>
          <div class="actions" style="margin-top:6px;">
            <button class="btn" style="flex:1;">加入今日</button>
            <button class="btn secondary" style="width:90px; ${isAdmin ? "" : "display:none;"}">删除</button>
          </div>
        </div>
      `;

      const btns = card.querySelectorAll("button");
      const addBtn = btns[0];
      const delBtn = btns[1];

      addBtn.onclick = () => addToToday(d.id);
      if(delBtn) delBtn.onclick = () => deleteDish(d.id);

      wrap.appendChild(card);
    });
  }

  function renderToday(){
    const wrap = $("todayList");
    if(!wrap) return;

    const items = [...state.today.entries()]
      .map(([id, qtyStr]) => {
        const qty = Number(qtyStr) || 0;
        const dish = state.dishes.find(d => d.id === id);
        return dish ? { dish, qty } : null;
      })
      .filter(Boolean);

    if(items.length === 0){
      wrap.className = "muted";
      wrap.textContent = "还没选菜";
      if($("total")) $("total").textContent = "¥0";
      if($("todayTip")) $("todayTip").textContent = "";
      return;
    }

    wrap.className = "";
    wrap.innerHTML = "";
    let total = 0;

    items.forEach(({dish, qty}) => {
      if(typeof dish.price === "number" && Number.isFinite(dish.price)) total += dish.price * qty;

      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `
        <div class="meta2">
          <div class="n">${escapeHtml(dish.name)}</div>
          <div class="muted">${escapeHtml(dish.cat || "未分类")} ${(typeof dish.price === "number" && Number.isFinite(dish.price)) ? "· "+money(dish.price) : ""}</div>
        </div>
        <div class="qty">
          <button>-</button>
          <div style="min-width:24px; text-align:center; font-weight:800;">${qty}</div>
          <button>+</button>
        </div>
      `;
      const [minus, plus] = row.querySelectorAll("button");
      minus.onclick = () => setTodayQty(dish.id, qty - 1);
      plus.onclick  = () => setTodayQty(dish.id, qty + 1);

      wrap.appendChild(row);
    });

    if($("total")) $("total").textContent = money(total);
    if($("todayTip")) $("todayTip").textContent = "提示：没填价格的菜不会计入总价。";
  }

  function addToToday(id){
    const cur = Number(state.today.get(id) || 0);
    state.today.set(id, String(cur + 1));
    save(LS_TODAY, Object.fromEntries(state.today));
    renderToday();
  }

  function setTodayQty(id, qty){
    if(qty <= 0) state.today.delete(id);
    else state.today.set(id, String(qty));
    save(LS_TODAY, Object.fromEntries(state.today));
    renderToday();
  }

  async function deleteDish(id){
    if(!isAdmin) return;
    state.dishes = state.dishes.filter(d => d.id !== id);
    state.today.delete(id);
    save(LS_TODAY, Object.fromEntries(state.today));
    const ok = await persistCloud();
    if(!ok) return;
    renderCats(); renderMenu(); renderToday();
    if($("tip")) $("tip").textContent = "已删除菜品（全家同步）。";
  }

  function resetForm(){
    if($("name")) $("name").value = "";
    if($("cat")) $("cat").value = "";
    if($("price")) $("price").value = "";
    if($("desc")) $("desc").value = "";
    if($("img")) $("img").value = "";
  }

  async function fileToDataUrl(file){
    return new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = reject;
      fr.readAsDataURL(file);
    });
  }

  async function addDish(){
    if(!isAdmin){
      if($("tip")) $("tip").textContent = "需要管理员登录才能添加。";
      return;
    }
    const name = ($("name")?.value || "").trim();
    if(!name){
      if($("tip")) $("tip").textContent = "请先填写菜名。";
      return;
    }
    const cat = (($("cat")?.value || "").trim() || "未分类");
    const desc = (($("desc")?.value || "").trim());
    const priceRaw = (($("price")?.value || "").trim());
    const priceNum = priceRaw ? Number(priceRaw) : null;

    // ✅ Firestore 不允许 NaN，所以没填/非法就存 null
    const price = (typeof priceNum === "number" && Number.isFinite(priceNum)) ? priceNum : null;

    const file = $("img")?.files?.[0] || null;
    let imgData = null;
    if(file){
      imgData = await fileToDataUrl(file); // 如果你之后遇到“图片太大”，我再给你加自动压缩/或改 Storage
    }

    state.dishes.push(sanitizeDish({ id: uid(), name, cat, desc, price, imgData }));

    const ok = await persistCloud();
    if(!ok) return;

    renderCats(); renderMenu();
    resetForm();
    if($("tip")) $("tip").textContent = "已保存菜品（全家同步）。";
  }

  async function seed(){
    if(!isAdmin) return;
    state.dishes = [...state.dishes, ...defaultDishes].map(sanitizeDish);
    const ok = await persistCloud();
    if(!ok) return;
    renderCats(); renderMenu();
    if($("tip")) $("tip").textContent = "已添加示例菜（全家同步）。";
  }

  async function wipeAll(){
    if(!isAdmin) return;
    state.dishes = [];
    const ok = await persistCloud();
    if(!ok) return;
    renderCats(); renderMenu(); renderToday();
    if($("tip")) $("tip").textContent = "已清空全部菜品（全家同步）。";
  }

  function clearToday(){
    state.today.clear();
    save(LS_TODAY, {});
    renderToday();
    if($("todayTip")) $("todayTip").textContent = "已清空今日清单（仅本机）。";
  }

  async function copyToday(){
    const note = ($("note")?.value || "").trim();
    const items = [...state.today.entries()].map(([id, qtyStr]) => {
      const dish = state.dishes.find(d => d.id === id);
      const qty = Number(qtyStr) || 0;
      return dish ? `${dish.name} × ${qty}` : null;
    }).filter(Boolean);

    const text = [
      "今日菜单：",
      ...items.map(x => "• " + x),
      note ? `备注：${note}` : ""
    ].filter(Boolean).join("\n");

    try{
      await navigator.clipboard.writeText(text);
      if($("todayTip")) $("todayTip").textContent = "已复制到剪贴板。";
    } catch {
      if($("todayTip")) $("todayTip").textContent = "复制失败（浏览器限制）。你可以手动选中复制。";
    }
  }

  // ===== 事件绑定 =====
  on("addBtn","click", addDish);
  on("resetBtn","click", resetForm);
  on("seedBtn","click", seed);
  on("wipeBtn","click", wipeAll);
  on("clearTodayBtn","click", clearToday);
  on("copyBtn","click", copyToday);

  $("search")?.addEventListener("input", (e) => {
    state.search = e.target.value || "";
    renderMenu();
  });

  // ✅ Redirect 登录（手机最稳）
  on("loginBtn","click", async () => {
    try{
      await signInWithRedirect(auth, provider);
    } catch (e){
      console.error(e);
      if($("tip")) $("tip").textContent = "登录失败：请换 Chrome/Safari 再试。";
    }
  });

  on("logoutBtn","click", async () => {
    await signOut(auth);
  });

  // 处理 redirect 回跳结果（不需要显示也行）
  getRedirectResult(auth).catch(() => {});

  // 登录状态 → 判断是否管理员
  onAuthStateChanged(auth, (user) => {
    const ok = !!user && user.email === ADMIN_EMAIL;
    setAdminUI(ok);
  });

  // 云端菜单实时同步
  onSnapshot(menuRef, (snap) => {
    const data = snap.data();
    if(data?.dishes && Array.isArray(data.dishes)){
      state.dishes = data.dishes.map(sanitizeDish);
    } else {
      // 云端未初始化时先显示默认示例菜
      state.dishes = defaultDishes.map(sanitizeDish);
    }
    if($("dishCount")) $("dishCount").textContent = "菜品：" + state.dishes.length;
    renderCats(); renderMenu(); renderToday();
  });

  // 初始渲染
  renderCats(); renderMenu(); renderToday();
</script>
</body>
</html>
