<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBomQvnrGffGpq4xd4rhF7amyiBME0eeMA",
    authDomain: "willa-menu-65de8.firebaseapp.com",
    projectId: "willa-menu-65de8",
    storageBucket: "willa-menu-65de8.firebasestorage.app",
    messagingSenderId: "521050906505",
    appId: "1:521050906505:web:ef2706e06aa50c95284b58"
  };

  const ADMIN_EMAIL = "yanwu6618@gmail.com";

  // ✅ 只初始化一次
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  const menuRef = doc(db, "menus", "default");

  const $ = (id) => document.getElementById(id);

  const LS_TODAY = "family_today_v2";

  const defaultDishes = [
    { id: uid(), name:"番茄炒蛋", cat:"家常菜", price:12, desc:"少油", imgData:null },
    { id: uid(), name:"玉米排骨汤", cat:"汤", price:28, desc:"清淡", imgData:null },
    { id: uid(), name:"清炒西兰花", cat:"蔬菜", price:10, desc:"蒜蓉", imgData:null },
    { id: uid(), name:"可乐鸡翅", cat:"荤菜", price:26, desc:"微甜", imgData:null },
  ];

  const state = {
    dishes: [],
    today: new Map(Object.entries(load(LS_TODAY, {}))),
    cat: "全部",
    search: ""
  };

  let isAdmin = false;

  function uid(){ return Math.random().toString(16).slice(2) + Date.now().toString(16); }
  function save(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
  function load(key, fallback){
    try { return JSON.parse(localStorage.getItem(key) || "null") ?? fallback; }
    catch { return fallback; }
  }
  function money(n){
    if (!Number.isFinite(n)) return "¥0";
    return "¥" + (Math.round(n * 100) / 100).toFixed(2).replace(/\.00$/,"");
  }
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, s => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[s]));
  }

  function categories(){
    const cats = [...new Set(state.dishes.map(d => d.cat || "未分类"))];
    cats.sort((a,b)=> a.localeCompare(b, "zh"));
    return ["全部", ...cats];
  }

  function setAdminUI(on){
    isAdmin = on;

    $("addBtn").disabled = !on;
    $("seedBtn").disabled = !on;
    $("wipeBtn").disabled = !on;
    $("name").disabled = !on;
    $("cat").disabled = !on;
    $("price").disabled = !on;
    $("desc").disabled = !on;
    $("img").disabled = !on;

    $("tip").textContent = on
      ? "管理员模式：可以修改菜单（全家同步）。"
      : "访客模式：只能查看菜单。";

    $("loginBtn").classList.toggle("hide", on);
    $("logoutBtn").classList.toggle("hide", !on);
    $("who").textContent = on ? ("管理员：" + ADMIN_EMAIL) : "访客模式";

    renderMenu();
  }

  async function persistCloud(){
    if(!isAdmin){
      $("tip").textContent = "你不是管理员，无法保存。";
      return;
    }
    await setDoc(menuRef, { dishes: state.dishes, updatedAt: serverTimestamp() }, { merge: true });
    $("dishCount").textContent = "菜品：" + state.dishes.length;
  }

  function renderCats(){
    const wrap = $("cats");
    wrap.innerHTML = "";
    categories().forEach(c => {
      const b = document.createElement("button");
      b.className = "chip" + (c === state.cat ? " active" : "");
      b.textContent = c;
      b.onclick = () => { state.cat = c; renderCats(); renderMenu(); };
      wrap.appendChild(b);
    });
  }

  function renderMenu(){
    const wrap = $("menu");
    wrap.innerHTML = "";

    const list = state.dishes
      .map(d => ({...d, cat: d.cat || "未分类"}))
      .filter(d => state.cat === "全部" ? true : d.cat === state.cat)
      .filter(d => (d.name || "").toLowerCase().includes(state.search.toLowerCase().trim()));

    if(list.length === 0){
      wrap.innerHTML = `<div class="muted" style="padding:10px;">暂无菜品。管理员登录后可添加。</div>`;
      return;
    }

    list.forEach(d => {
      const card = document.createElement("div");
      card.className = "card";
      const hasImg = !!d.imgData;

      card.innerHTML = `
        <div class="img">${hasImg ? `<img alt="" src="${d.imgData}">` : "暂无图片"}</div>
        <div class="c">
          <div class="name">${escapeHtml(d.name || "未命名")}</div>
          <div class="meta">
            <span>${escapeHtml(d.cat)}</span>
            <span>${Number.isFinite(d.price) ? money(d.price) : ""}</span>
          </div>
          <div class="muted">${escapeHtml(d.desc || "")}</div>
          <div class="actions" style="margin-top:6px;">
            <button class="btn" style="flex:1;">加入今日</button>
            <button class="btn secondary" style="width:90px; ${isAdmin ? "" : "display:none;"}">删除</button>
          </div>
        </div>
      `;

      const [addBtn, delBtn] = card.querySelectorAll("button");
      addBtn.onclick = () => addToToday(d.id);
      if (delBtn) delBtn.onclick = () => deleteDish(d.id);

      wrap.appendChild(card);
    });
  }

  function renderToday(){
    const wrap = $("todayList");
    const items = [...state.today.entries()]
      .map(([id, qtyStr]) => {
        const qty = Number(qtyStr) || 0;
        const dish = state.dishes.find(d => d.id === id);
        return dish ? { dish, qty } : null;
      })
      .filter(Boolean);

    if(items.length === 0){
      wrap.className = "muted";
      wrap.textContent = "还没选菜";
      $("total").textContent = "¥0";
      $("todayTip").textContent = "";
      return;
    }

    wrap.className = "";
    wrap.innerHTML = "";
    let total = 0;

    items.forEach(({dish, qty}) => {
      if(Number.isFinite(dish.price)) total += dish.price * qty;

      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `
        <div class="meta2">
          <div class="n">${escapeHtml(dish.name)}</div>
          <div class="muted">${escapeHtml(dish.cat || "未分类")} ${Number.isFinite(dish.price) ? "· "+money(dish.price) : ""}</div>
        </div>
        <div class="qty">
          <button>-</button>
          <div style="min-width:24px; text-align:center; font-weight:800;">${qty}</div>
          <button>+</button>
        </div>
      `;
      const [minus, plus] = row.querySelectorAll("button");
      minus.onclick = () => setTodayQty(dish.id, qty - 1);
      plus.onclick  = () => setTodayQty(dish.id, qty + 1);

      wrap.appendChild(row);
    });

    $("total").textContent = money(total);
    $("todayTip").textContent = "提示：没填价格的菜不会计入总价。";
  }

  function addToToday(id){
    const cur = Number(state.today.get(id) || 0);
    state.today.set(id, String(cur + 1));
    save(LS_TODAY, Object.fromEntries(state.today));
    renderToday();
  }

  function setTodayQty(id, qty){
    if(qty <= 0) state.today.delete(id);
    else state.today.set(id, String(qty));
    save(LS_TODAY, Object.fromEntries(state.today));
    renderToday();
  }

  async function deleteDish(id){
    if(!isAdmin) return;
    state.dishes = state.dishes.filter(d => d.id !== id);
    state.today.delete(id);
    save(LS_TODAY, Object.fromEntries(state.today));
    await persistCloud();
    renderCats(); renderMenu(); renderToday();
    $("tip").textContent = "已删除菜品（全家同步）。";
  }

  function resetForm(){
    $("name").value = "";
    $("cat").value = "";
    $("price").value = "";
    $("desc").value = "";
    $("img").value = "";
  }

  async function fileToDataUrl(file){
    return new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = reject;
      fr.readAsDataURL(file);
    });
  }

  async function addDish(){
    if(!isAdmin){
      $("tip").textContent = "需要管理员登录才能添加。";
      return;
    }
    const name = $("name").value.trim();
    if(!name){
      $("tip").textContent = "请先填写菜名。";
      return;
    }
    const cat = ($("cat").value.trim() || "未分类");
    const desc = $("desc").value.trim();
    const priceRaw = $("price").value.trim();
    const price = priceRaw ? Number(priceRaw) : NaN;

    const file = $("img").files?.[0] || null;
    let imgData = null;
    if(file) imgData = await fileToDataUrl(file);

    state.dishes.push({ id: uid(), name, cat, desc, price: Number.isFinite(price) ? price : NaN, imgData });
    await persistCloud();
    renderCats(); renderMenu();
    resetForm();
    $("tip").textContent = "已保存菜品（全家同步）。";
  }

  async function seed(){
    if(!isAdmin) return;
    state.dishes = [...state.dishes, ...defaultDishes];
    await persistCloud();
    renderCats(); renderMenu();
    $("tip").textContent = "已添加示例菜（全家同步）。";
  }

  async function wipeAll(){
    if(!isAdmin) return;
    state.dishes = [];
    await persistCloud();
    renderCats(); renderMenu(); renderToday();
    $("tip").textContent = "已清空全部菜品（全家同步）。";
  }

  function clearToday(){
    state.today.clear();
    save(LS_TODAY, {});
    renderToday();
    $("todayTip").textContent = "已清空今日清单（仅本机）。";
  }

  async function copyToday(){
    const note = $("note").value.trim();
    const items = [...state.today.entries()].map(([id, qtyStr]) => {
      const dish = state.dishes.find(d => d.id === id);
      const qty = Number(qtyStr) || 0;
      return dish ? `${dish.name} × ${qty}` : null;
    }).filter(Boolean);

    const text = [
      "今日菜单：",
      ...items.map(x => "• " + x),
      note ? `备注：${note}` : ""
    ].filter(Boolean).join("\n");

    try{
      await navigator.clipboard.writeText(text);
      $("todayTip").textContent = "已复制到剪贴板。";
    } catch {
      $("todayTip").textContent = "复制失败（浏览器限制）。你可以手动选中复制。";
    }
  }

  $("addBtn").onclick = addDish;
  $("resetBtn").onclick = resetForm;
  $("seedBtn").onclick = seed;
  $("wipeBtn").onclick = wipeAll;
  $("clearTodayBtn").onclick = clearToday;
  $("copyBtn").onclick = copyToday;

  $("search").addEventListener("input", (e) => {
    state.search = e.target.value || "";
    renderMenu();
  });

  $("loginBtn").onclick = async () => {
    try{ await signInWithPopup(auth, provider); }
    catch { $("tip").textContent = "登录失败：请允许弹窗，或换 Chrome/Safari 再试。"; }
  };

  $("logoutBtn").onclick = async () => { await signOut(auth); };

  onAuthStateChanged(auth, (user) => {
    const ok = !!user && user.email === ADMIN_EMAIL;
    setAdminUI(ok);
  });

  onSnapshot(menuRef, (snap) => {
    const data = snap.data();
    if(data?.dishes && Array.isArray(data.dishes)){
      state.dishes = data.dishes;
    } else {
      // 云端没初始化时先显示默认示例菜
      state.dishes = defaultDishes;
    }
    $("dishCount").textContent = "菜品：" + state.dishes.length;
    renderCats(); renderMenu(); renderToday();
  });

  renderCats(); renderMenu(); renderToday();
</script>
