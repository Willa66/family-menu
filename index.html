<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>家庭菜单</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, "PingFang SC","Microsoft YaHei", sans-serif; }
    body{ margin:0; background:#f6f7f9; }
    header{ position:sticky; top:0; z-index:5; background:#fff; border-bottom:1px solid #e7e7e7; padding:12px 14px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    header h1{ margin:0; font-size:16px; flex:1; }
    .btn{ border:0; border-radius:12px; padding:10px 12px; cursor:pointer; background:#111; color:#fff; }
    .btn.secondary{ background:#f1f2f4; color:#111; border:1px solid #e7e7e7; }
    .wrap{ display:grid; grid-template-columns: 320px 1fr 360px; gap:12px; padding:12px; }
    @media (max-width: 980px){ .wrap{ grid-template-columns: 1fr; } }
    .panel{ background:#fff; border:1px solid #e7e7e7; border-radius:14px; overflow:hidden; }
    .panel h2{ margin:0; font-size:14px; padding:12px 14px; border-bottom:1px solid #eee; background:#fafafa; }
    .p{ padding:12px; }
    label{ display:block; font-size:12px; color:#666; margin-bottom:6px; }
    input, textarea{ width:100%; box-sizing:border-box; padding:10px; border-radius:12px; border:1px solid #e7e7e7; }
    .grid2{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .muted{ color:#666; font-size:12px; }
    .cats{ padding:10px; display:flex; flex-wrap:wrap; gap:8px; }
    .chip{ border:1px solid #e7e7e7; background:#fff; border-radius:999px; padding:8px 10px; cursor:pointer; font-size:12px; }
    .chip.active{ border-color:#111; }
    .menu{ padding:10px; display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:10px; }
    @media (max-width: 980px){ .menu{ grid-template-columns: repeat(2, minmax(0,1fr)); } }
    @media (max-width: 520px){ .menu{ grid-template-columns: 1fr; } }
    .card{ border:1px solid #eee; border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
    .img{ width:100%; aspect-ratio: 4 / 3; background:#f1f2f4; display:flex; align-items:center; justify-content:center; color:#888; font-size:12px; }
    .img img{ width:100%; height:100%; object-fit:cover; display:block; }
    .card .c{ padding:10px; display:flex; flex-direction:column; gap:6px; }
    .name{ font-weight:800; }
    .meta{ display:flex; justify-content:space-between; gap:8px; font-size:12px; color:#666; }
    .row{ display:flex; align-items:center; gap:8px; border:1px solid #eee; border-radius:14px; padding:10px; }
    .row .meta2{ flex:1; }
    .row .meta2 .n{ font-weight:800; }
    .qty{ display:flex; align-items:center; gap:6px; }
    .qty button{ width:32px; height:32px; border-radius:10px; border:1px solid #e7e7e7; background:#fff; cursor:pointer; }
    .sum{ border-top:1px solid #eee; padding-top:10px; display:flex; flex-direction:column; gap:8px; }
    .actions{ display:flex; gap:8px; }
    .pill{ font-size:12px; padding:4px 8px; border-radius:999px; background:#f1f2f4; }
    .danger{ color:#b42318; }
    .hide{ display:none !important; }

    /* 弹窗 */
    .mask{ position:fixed; inset:0; background:rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal{ width:min(420px, 100%); background:#fff; border-radius:16px; border:1px solid #eee; overflow:hidden; }
    .modal h3{ margin:0; padding:14px 16px; font-size:14px; border-bottom:1px solid #eee; background:#fafafa; }
    .modal .b{ padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
    .modal .ft{ padding:14px 16px; border-top:1px solid #eee; display:flex; gap:8px; justify-content:flex-end; }
    code.k{ background:#f1f2f4; padding:2px 6px; border-radius:8px; }
  </style>
</head>
<body>
<header>
  <h1>🍳 家庭菜单</h1>
  <span class="pill" id="dishCount">菜品：0</span>

  <button class="btn secondary" id="unlockBtn">管理员登录</button>
  <button class="btn secondary hide" id="lockBtn">退出管理员</button>
  <span class="pill" id="who">访客模式</span>

  <button class="btn secondary" id="forceRefreshBtn">同步刷新</button>
</header>

<div class="wrap">
  <!-- 左：管理 -->
  <section class="panel">
    <h2>添加/管理菜品（管理员）</h2>
    <div class="p">
      <div class="grid2">
        <div>
          <label>菜名</label>
          <input id="name" placeholder="例如：红烧排骨" />
        </div>
        <div>
          <label>分类</label>
          <input id="cat" placeholder="例如：家常菜 / 汤 / 甜品" />
        </div>
      </div>

      <div class="grid2" style="margin-top:10px;">
        <div>
          <label>价格（可选）</label>
          <input id="price" placeholder="例如：25（不填也行）" inputmode="decimal" />
        </div>
        <div>
          <label>图片（建议小一点）</label>
          <input id="img" type="file" accept="image/*" />
        </div>
      </div>

      <div style="margin-top:10px;">
        <label>备注（可选）</label>
        <input id="desc" placeholder="例如：少油 / 微辣" />
      </div>

      <div class="actions" style="margin-top:12px;">
        <button class="btn" id="addBtn" style="flex:1;">保存菜品</button>
        <button class="btn secondary" id="resetBtn" style="flex:1;">清空输入</button>
      </div>

      <div class="sum" style="margin-top:12px;">
        <div class="actions">
          <button class="btn secondary" id="seedBtn" style="flex:1;">添加示例菜</button>
          <button class="btn secondary danger" id="wipeBtn" style="flex:1;">清空全部菜品</button>
        </div>
        <div class="muted" id="tip"></div>
      </div>

      <div class="muted" style="margin-top:10px;">
        菜单存云端：你改一次，全家所有设备刷新后都是最新。<br/>
        右侧“今日清单”仍然是每个人自己的（本机保存）。
      </div>
    </div>
  </section>

  <!-- 中：菜单 -->
  <section class="panel">
    <h2>菜单</h2>
    <div class="cats" id="cats"></div>
    <div class="p" style="padding-top:0;">
      <input id="search" placeholder="搜索菜名..." />
    </div>
    <div class="menu" id="menu"></div>
  </section>

  <!-- 右：今日清单 -->
  <aside class="panel">
    <h2>今日要做/要吃</h2>
    <div class="p">
      <div id="todayList" class="muted">还没选菜</div>

      <div style="margin-top:10px;">
        <label>整单备注（可选）</label>
        <textarea id="note" rows="2" placeholder="例如：今天清淡一点"></textarea>
      </div>

      <div class="sum">
        <div style="display:flex; justify-content:space-between;">
          <div>预计总价</div>
          <div style="font-weight:900;" id="total">¥0</div>
        </div>
        <div class="actions">
          <button class="btn secondary" id="clearTodayBtn" style="flex:1;">清空今日清单</button>
          <button class="btn" id="copyBtn" style="flex:1;">复制清单</button>
        </div>
        <div class="muted" id="todayTip"></div>
      </div>
    </div>
  </aside>
</div>

<!-- 管理员密码弹窗 -->
<div class="mask hide" id="mask">
  <div class="modal">
    <h3>管理员登录</h3>
    <div class="b">
      <div class="muted">请输入管理员密码。</div>
      <input id="pwd" type="password" placeholder="管理员密码" />
      <div class="muted" id="pwdTip"></div>
      <div class="muted">
        提示：此方案为“家庭自用简化版”，密码会出现在网页源码里（不适合公开商用）。
      </div>
    </div>
    <div class="ft">
      <button class="btn secondary" id="cancelPwd">取消</button>
      <button class="btn" id="okPwd">确定</button>
    </div>
  </div>
</div>

<!-- Firebase（jsDelivr，国内一般更稳） -->
<script type="module">
  /*********************
   * 0) 你的配置（保持你现有 Firebase 项目）
   *********************/
  const firebaseConfig = {
    apiKey: "AIzaSyBomQvnrGffGpq4xd4rhF7amyiBME0eeMA",
    authDomain: "willa-menu-65de8.firebaseapp.com",
    projectId: "willa-menu-65de8",
    storageBucket: "willa-menu-65de8.firebasestorage.app",
    messagingSenderId: "521050906505",
    appId: "1:521050906505:web:ef2706e06aa50c95284b58"
  };

  // ✅ 管理员密码（你要改就改这里）
  const ADMIN_PASSWORD = "willa";

  // ✅ Firestore 文档位置（与你之前一致）
  const COL = "menus";
  const DOC_ID = "default";

  /*********************
   * 1) Firebase SDK（模块）
   *********************/
 import { initializeApp } from "https://esm.sh/firebase@10.12.5/app";
 import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://esm.sh/firebase@10.12.5/firestore";

  /*********************
   * 2) 工具函数
   *********************/
  const $ = (id) => document.getElementById(id);

  const SS_ADMIN = "family_menu_admin_v1";      // sessionStorage：管理员状态（只在当前浏览器会话）
  const LS_TODAY = "family_today_v4";           // localStorage：今日清单（每台设备独立）
  const LS_CACHED_MENU = "family_menu_cache_v1";// localStorage：菜单缓存（云端失败时兜底显示）

  function uid(){ return Math.random().toString(16).slice(2) + Date.now().toString(16); }
  function money(n){
    if (!Number.isFinite(n)) return "¥0";
    return "¥" + (Math.round(n * 100) / 100).toFixed(2).replace(/\.00$/,"");
  }
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, s => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[s]));
  }
  function saveLocal(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
  function loadLocal(key, fallback){
    try { return JSON.parse(localStorage.getItem(key) || "null") ?? fallback; }
    catch { return fallback; }
  }

  // 🔒 关键：写入 Firestore 的对象必须是“纯 JSON”
  // - 不要 NaN / undefined / Map / Date / 函数 / class / DOM
  function normalizeDish(d){
    const priceNum = (d && d.price !== null && d.price !== "" && Number.isFinite(Number(d.price)))
      ? Number(d.price)
      : null;

    const img = (typeof d?.imgData === "string" && d.imgData.startsWith("data:")) ? d.imgData : null;

    return {
      id: String(d?.id || uid()),
      name: String(d?.name || "").trim(),
      cat: String(d?.cat || "未分类").trim() || "未分类",
      desc: String(d?.desc || "").trim(),
      price: priceNum,
      imgData: img
    };
  }

  async function fileToDataUrlCompressed(file, maxW=900, quality=0.78){
    const img = await new Promise((res, rej) => {
      const i = new Image();
      i.onload = () => res(i);
      i.onerror = rej;
      i.src = URL.createObjectURL(file);
    });

    const scale = Math.min(1, maxW / img.width);
    const w = Math.round(img.width * scale);
    const h = Math.round(img.height * scale);

    const canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(img.src);

    return canvas.toDataURL("image/jpeg", quality);
  }

  function setTip(msg){ $("tip").textContent = msg || ""; }

  function isAdmin(){ return sessionStorage.getItem(SS_ADMIN) === "1"; }
  function setAdmin(on){
    sessionStorage.setItem(SS_ADMIN, on ? "1" : "0");
    $("unlockBtn").classList.toggle("hide", on);
    $("lockBtn").classList.toggle("hide", !on);
    $("who").textContent = on ? "管理员模式" : "访客模式";

    // 管理区输入与按钮
    const dis = !on;
    ["addBtn","seedBtn","wipeBtn","name","cat","price","desc","img"].forEach(id => $(id).disabled = dis);

    setTip(on ? "管理员模式：可以修改菜单（云端同步）。" : "访客模式：只能查看菜单。");
    renderMenu();
  }

  /*********************
   * 3) 默认菜（云端空/失败时兜底）
   *********************/
  const defaultDishes = [
    { id: uid(), name:"番茄炒蛋", cat:"家常菜", price:12, desc:"少油", imgData:null },
    { id: uid(), name:"玉米排骨汤", cat:"汤", price:28, desc:"清淡", imgData:null },
    { id: uid(), name:"清炒西兰花", cat:"蔬菜", price:10, desc:"蒜蓉", imgData:null },
    { id: uid(), name:"可乐鸡翅", cat:"荤菜", price:26, desc:"微甜", imgData:null },
  ].map(normalizeDish);

  /*********************
   * 4) 状态
   *********************/
  const state = {
    dishes: [],
    today: new Map(Object.entries(loadLocal(LS_TODAY, {}))),
    cat: "全部",
    search: ""
  };

  function categories(){
    const cats = [...new Set(state.dishes.map(d => d.cat || "未分类"))];
    cats.sort((a,b)=> a.localeCompare(b, "zh"));
    return ["全部", ...cats];
  }

  function renderCats(){
    const wrap = $("cats");
    wrap.innerHTML = "";
    categories().forEach(c => {
      const b = document.createElement("button");
      b.className = "chip" + (c === state.cat ? " active" : "");
      b.textContent = c;
      b.onclick = () => { state.cat = c; renderCats(); renderMenu(); };
      wrap.appendChild(b);
    });
  }

  function renderMenu(){
    const wrap = $("menu");
    wrap.innerHTML = "";

    const list = state.dishes
      .map(d => ({...d, cat: d.cat || "未分类"}))
      .filter(d => state.cat === "全部" ? true : d.cat === state.cat)
      .filter(d => (d.name || "").toLowerCase().includes(state.search.toLowerCase().trim()));

    if(list.length === 0){
      wrap.innerHTML = `<div class="muted" style="padding:10px;">暂无菜品。</div>`;
      return;
    }

    const admin = isAdmin();

    list.forEach(d => {
      const card = document.createElement("div");
      card.className = "card";
      const hasImg = !!d.imgData;

      card.innerHTML = `
        <div class="img">${hasImg ? `<img alt="" src="${d.imgData}">` : "暂无图片"}</div>
        <div class="c">
          <div class="name">${escapeHtml(d.name || "未命名")}</div>
          <div class="meta">
            <span>${escapeHtml(d.cat)}</span>
            <span>${(d.price !== null && Number.isFinite(d.price)) ? money(d.price) : ""}</span>
          </div>
          <div class="muted">${escapeHtml(d.desc || "")}</div>
          <div class="actions" style="margin-top:6px;">
            <button class="btn" style="flex:1;">加入今日</button>
            <button class="btn secondary" style="width:90px; ${admin ? "" : "display:none;"}">删除</button>
          </div>
        </div>
      `;

      const [addBtn, delBtn] = card.querySelectorAll("button");
      addBtn.onclick = () => addToToday(d.id);
      if (delBtn) delBtn.onclick = () => deleteDish(d.id);

      wrap.appendChild(card);
    });
  }

  function renderToday(){
    const wrap = $("todayList");
    const items = [...state.today.entries()]
      .map(([id, qtyStr]) => {
        const qty = Number(qtyStr) || 0;
        const dish = state.dishes.find(d => d.id === id);
        return dish ? { dish, qty } : null;
      })
      .filter(Boolean);

    if(items.length === 0){
      wrap.className = "muted";
      wrap.textContent = "还没选菜";
      $("total").textContent = "¥0";
      $("todayTip").textContent = "";
      return;
    }

    wrap.className = "";
    wrap.innerHTML = "";
    let total = 0;

    items.forEach(({dish, qty}) => {
      if(Number.isFinite(dish.price)) total += dish.price * qty;

      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `
        <div class="meta2">
          <div class="n">${escapeHtml(dish.name)}</div>
          <div class="muted">${escapeHtml(dish.cat || "未分类")} ${Number.isFinite(dish.price) ? "· "+money(dish.price) : ""}</div>
        </div>
        <div class="qty">
          <button>-</button>
          <div style="min-width:24px; text-align:center; font-weight:800;">${qty}</div>
          <button>+</button>
        </div>
      `;
      const [minus, plus] = row.querySelectorAll("button");
      minus.onclick = () => setTodayQty(dish.id, qty - 1);
      plus.onclick  = () => setTodayQty(dish.id, qty + 1);

      wrap.appendChild(row);
    });

    $("total").textContent = money(total);
    $("todayTip").textContent = "提示：没填价格的菜不会计入总价。";
  }

  function addToToday(id){
    const cur = Number(state.today.get(id) || 0);
    state.today.set(id, String(cur + 1));
    saveLocal(LS_TODAY, Object.fromEntries(state.today));
    renderToday();
  }

  function setTodayQty(id, qty){
    if(qty <= 0) state.today.delete(id);
    else state.today.set(id, String(qty));
    saveLocal(LS_TODAY, Object.fromEntries(state.today));
    renderToday();
  }

  function resetForm(){
    $("name").value = "";
    $("cat").value = "";
    $("price").value = "";
    $("desc").value = "";
    $("img").value = "";
  }

  /*********************
   * 5) Firestore：读写 + 实时同步
   *********************/
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const menuRef = doc(db, COL, DOC_ID);

  function applyDishes(list, note){
    state.dishes = (Array.isArray(list) ? list : []).map(normalizeDish).filter(d => d.name);
    $("dishCount").textContent = "菜品：" + state.dishes.length;
    renderCats(); renderMenu(); renderToday();

    // 缓存一份，云端失败时给手机兜底
    saveLocal(LS_CACHED_MENU, { dishes: state.dishes, cachedAt: Date.now() });

    if(note) setTip(note);
  }

  async function fetchOnce(){
    const snap = await getDoc(menuRef);
    const data = snap.exists() ? snap.data() : null;
    if(data && Array.isArray(data.dishes)) return data.dishes;
    return null;
  }

  // 带重试（国内网络抖动时更稳）
  async function fetchWithRetry(times=3){
    let lastErr = null;
    for(let i=0;i<times;i++){
      try{
        const res = await fetchOnce();
        return res;
      } catch(e){
        lastErr = e;
        await new Promise(r => setTimeout(r, 500 * (i+1)));
      }
    }
    throw lastErr;
  }

  async function saveToCloud(dishes){
    // 再次严格 normalize，避免 nested entity
    const safe = (dishes || []).map(normalizeDish).filter(d => d.name);
    await setDoc(menuRef, { dishes: safe, updatedAt: Date.now() }, { merge: true });
    return safe;
  }

  function startRealtime(){
    onSnapshot(menuRef, (snap) => {
      const data = snap.exists() ? snap.data() : null;
      if(data && Array.isArray(data.dishes)){
        applyDishes(data.dishes, "");
      } else {
        // 云端空：先显示默认（不自动写入）
        applyDishes(defaultDishes, "云端还没初始化菜单，先显示示例菜。管理员可保存后同步。");
      }
    }, (err) => {
      console.warn("onSnapshot error:", err);
      setTip("实时同步失败（网络不稳定）。你可以点右上角“同步刷新”。");
    });
  }

  /*********************
   * 6) 管理操作（写云端）
   *********************/
  async function addDish(){
    if(!isAdmin()){
      setTip("需要管理员登录才能添加。");
      return;
    }

    const name = $("name").value.trim();
    if(!name){ setTip("请先填写菜名。"); return; }

    const cat = ($("cat").value.trim() || "未分类");
    const desc = $("desc").value.trim();
    const priceRaw = $("price").value.trim();
    const price = priceRaw ? Number(priceRaw) : null;

    const file = $("img").files && $("img").files[0] ? $("img").files[0] : null;
    let imgData = null;
    if(file){
      imgData = await fileToDataUrlCompressed(file, 900, 0.78);
    }

    const dish = normalizeDish({ id: uid(), name, cat, desc, price, imgData });
    const next = [...state.dishes, dish].map(normalizeDish);

    try{
      const saved = await saveToCloud(next);
      applyDishes(saved, "已保存菜品（云端同步）。");
      resetForm();
    } catch(e){
      console.error(e);
      setTip("保存失败：请检查 Firestore Rules 是否允许写入。");
    }
  }

  async function deleteDish(id){
    if(!isAdmin()) return;
    const next = state.dishes.filter(d => d.id !== id).map(normalizeDish);

    try{
      const saved = await saveToCloud(next);
      state.today.delete(id);
      saveLocal(LS_TODAY, Object.fromEntries(state.today));
      applyDishes(saved, "已删除菜品（云端同步）。");
    } catch(e){
      console.error(e);
      setTip("删除失败：请检查 Firestore Rules。");
    }
  }

  async function seed(){
    if(!isAdmin()) return;
    const next = [...state.dishes, ...defaultDishes].map(normalizeDish);
    try{
      const saved = await saveToCloud(next);
      applyDishes(saved, "已添加示例菜（云端同步）。");
    } catch(e){
      console.error(e);
      setTip("添加示例失败：请检查 Firestore Rules。");
    }
  }

  async function wipeAll(){
    if(!isAdmin()) return;
    try{
      const saved = await saveToCloud([]);
      applyDishes(saved, "已清空全部菜品（云端同步）。");
    } catch(e){
      console.error(e);
      setTip("清空失败：请检查 Firestore Rules。");
    }
  }

  function clearToday(){
    state.today.clear();
    saveLocal(LS_TODAY, {});
    renderToday();
    $("todayTip").textContent = "已清空今日清单（仅本机）。";
  }

  async function copyToday(){
    const note = $("note").value.trim();
    const items = [...state.today.entries()].map(([id, qtyStr]) => {
      const dish = state.dishes.find(d => d.id === id);
      const qty = Number(qtyStr) || 0;
      return dish ? `${dish.name} × ${qty}` : null;
    }).filter(Boolean);

    const text = [
      "今日菜单：",
      ...items.map(x => "• " + x),
      note ? `备注：${note}` : ""
    ].filter(Boolean).join("\n");

    try{
      await navigator.clipboard.writeText(text);
      $("todayTip").textContent = "已复制到剪贴板。";
    } catch {
      $("todayTip").textContent = "复制失败（浏览器限制）。你可以手动选中复制。";
    }
  }

  /*********************
   * 7) 管理员弹窗
   *********************/
  function openPwd(){
    $("pwd").value = "";
    $("pwdTip").textContent = "";
    $("mask").classList.remove("hide");
    $("pwd").focus();
  }
  function closePwd(){ $("mask").classList.add("hide"); }

  /*********************
   * 8) 事件绑定
   *********************/
  $("addBtn").onclick = addDish;
  $("resetBtn").onclick = resetForm;
  $("seedBtn").onclick = seed;
  $("wipeBtn").onclick = wipeAll;
  $("clearTodayBtn").onclick = clearToday;
  $("copyBtn").onclick = copyToday;

  $("search").addEventListener("input", (e) => {
    state.search = e.target.value || "";
    renderMenu();
  });

  $("unlockBtn").onclick = openPwd;
  $("lockBtn").onclick = () => setAdmin(false);

  $("cancelPwd").onclick = closePwd;
  $("okPwd").onclick = () => {
    const v = $("pwd").value;
    if(v === ADMIN_PASSWORD){
      setAdmin(true);
      closePwd();
    } else {
      $("pwdTip").textContent = "密码不正确。";
    }
  };
  $("mask").addEventListener("click", (e) => { if(e.target === $("mask")) closePwd(); });

  $("forceRefreshBtn").onclick = async () => {
    try{
      setTip("正在同步云端...");
      const dishes = await fetchWithRetry(3);
      if(dishes) applyDishes(dishes, "已从云端同步。");
      else applyDishes(defaultDishes, "云端为空，先显示示例菜。");
    } catch(e){
      console.error(e);
      setTip("同步失败：网络不稳定。建议换网络或稍后再试。");
    }
  };

  /*********************
   * 9) 启动：先读缓存 → 再连云端 → 开实时
   *********************/
  setAdmin(isAdmin());

  // 先用缓存/默认渲染，避免手机打开白屏/没菜
  const cached = loadLocal(LS_CACHED_MENU, null);
  if(cached && Array.isArray(cached.dishes) && cached.dishes.length){
    applyDishes(cached.dishes, "已加载本地缓存菜单（云端同步中…）");
  } else {
    applyDishes(defaultDishes, "正在连接云端…");
  }

  // 然后尝试拉云端一次
  (async () => {
    try{
      const dishes = await fetchWithRetry(3);
      if(dishes) applyDishes(dishes, "");
      else applyDishes(defaultDishes, "云端还没初始化菜单，先显示示例菜。");
    } catch(e){
      console.warn("initial fetch fail:", e);
      setTip("云端连接失败：已显示本地缓存/示例菜。可点右上角“同步刷新”。");
    }
  })();

  // 开启实时监听（能连上就实时同步）
  startRealtime();
</script>
</body>
</html>
